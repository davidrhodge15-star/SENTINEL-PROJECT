services:
  backend:
    build: ./backend
    # This is the missing piece: it maps your Mac's 8000 to Docker's 8000
    ports:
      - "8000:8000"
    privileged: true
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=sqlite:///./sentinel.db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:8000